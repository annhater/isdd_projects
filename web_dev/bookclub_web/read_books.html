            <div class="book-item" data-title="Still Born" data-author="by Guadelupe Nettel" data-info="September 2025 &middot; Rating: 8">

            <div class="book-item" data-title="Stolen" data-author="by Ann-Helén Laestadius" data-info="Jan 2026 &middot; Rating: 7">

            <div class="book-item" data-title="Things We Lost in the Fire" data-author="by Mariana Enriquez" data-info="Dec 2026 &middot; Rating: _">
                <img src="images/books/things_we_lost.jpg" alt="Things We Lost in the Fire">
            </div>
            <div class="book-item" data-title="Our Lady of the Nile" data-author="by Scholastique Mukasonga" data-info="Feb 2026 &middot; Rating: _">

            <div class="book-item" data-title="Project Hail Mary" data-author="by Andy Weir" data-info="Mar 2026 &middot; Rating: _">

    <footer>
        <p> Website developed by: Perova Anna, the Chill Book Club host </p>

    <!-- Socials Button -->

    <!-- Socials Modal -->

        <button class="socials-modal-close" id="socialsModalClose">✕</button>
        <h2> Our socials </h2>
        <div class="row social" align="center">
            <a  href= "https://chat.whatsapp.com/LfcwpVG3Og2DVkN3QR7uVb"> <img src="images/whatsapp.png" alt="WhatsApp" width="15" height="15"></a>
            <a  href= "https://bookclubs.com/modern-literati/about-our-club"> <img src="images/bookclubs.png" alt="BookClubs" width="15" height="15"></a>
            <a  href= 'mailto:mail.chillbookclub@gmail.com'> <img src="images/email.png" alt="Email" width="15" height="15"></a>
        </div>
    </div>

    <!-- Book Info Modal -->
    <div class="book-modal" id="bookModal">
        <div class="book-modal-content">
            <button class="book-modal-close" id="bookModalClose">✕</button>
            <h2 id="bookTitle"></h2>
            <p id="bookInfo"></p>
        </div>
    </div>

    <!-- Sidebar + overlay -->
    <aside id="sidebar" class="sidebar" aria-hidden="true">
        <nav>
            <ul class="sidebar-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="message_board.html">Announcements</a></li>
                <li><a href="book_themes.html">Book Themes Schedule</a></li>
                <li><a href="gallery.html">Past Meetings</a></li>
                <li><a href="read_books.html">Read Books</a></li>
                <li><a href="polls.html">Polls</a></li>

            </ul>
        </nav>
    </aside>
    <div id="overlay" class="overlay" hidden></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('bookModal');
            const modalTitle = document.getElementById('bookTitle');
            const modalInfo = document.getElementById('bookInfo');
            const closeBtn = document.getElementById('bookModalClose');

            document.querySelectorAll('.book-item').forEach(item => {
                item.addEventListener('click', function() {
                    const title = this.getAttribute('data-title');
                    const author = this.getAttribute('data-author');
                    const info = this.getAttribute('data-info');
                    modalTitle.textContent = `${title}${author}`;
                    modalInfo.textContent = info;
                    modal.classList.add('active');
                });
            });

            closeBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
